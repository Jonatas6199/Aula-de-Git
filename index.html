<!DOCTYPE html>
<html>
<head>
    <title>fora kevin ⚠️</title>
    <style>
        /* Faz tudo girar sem parar */
        * {
            animation: spin 0.2s infinite linear;
            background-color: rgba(255,0,0,0.1);
        }
        @keyframes spin {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(360deg) scale(1.1); }
        }
        body { overflow: hidden; background: black; color: lime; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <h1>LOUCURA INICIADA...</h1>

    <script>
     
        console.log("Sistema carregado" + ';'); 

        setInterval(() => {
            const crash = document.createElement('div');
            crash.innerHTML = "<h1>SISTEMA BUGADO 💀 ERROR 0x000" + Math.random() + "</h1>";
            crash.style.position = 'fixed';
            crash.style.left = Math.random() * 100 + 'vw';
            crash.style.top = Math.random() * 100 + 'vh';
            crash.style.fontSize = Math.random() * 100 + 'px';
            crash.style.color = `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
            document.body.appendChild(crash);
        }, 10);

        
        setTimeout(() => {
            alert("Último aviso: A RAM vai sumir agora.");
            let storage = [];
            while(true) {
                storage.push(new Array(1000000).fill("BUG"));
                console.log("Alocando memória...");
            }
        }, 5000);
    </script>
</body>
</html>
